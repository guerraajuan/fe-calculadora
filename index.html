<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Calculadora CI/CD</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .calc { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 80px; padding: 10px; margin: 5px; font-size: 16px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        h2 { margin-top: 15px; color: #333; }
    </style>
</head>
<body>

    <div class="calc">
        <h3>Calculadora CI/CD</h3>
        <input type="number" id="num1" value="0">
        <input type="number" id="num2" value="0">
        <br><br>
        <button onclick="ejecutarSuma()">Sumar</button>
        <h2>Resultado: <span id="resultado">-</span></h2>
    </div>

    <script src="src/calculator.js"></script>
    <script>
        function ejecutarSuma() {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            // sumar() viene del archivo externo ahora
            document.getElementById('resultado').innerText = sumar(n1, n2);
        }
    </script>
</body>
</html>
